name: Build & Deploy Slidev Lectures (Node 22 + pnpm)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # Checkout
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------
      # Setup Node
      # -------------------------------
      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # -------------------------------
      # Enable pnpm
      # -------------------------------
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      # -------------------------------
      # Install dependencies
      # -------------------------------
      - name: Install dependencies
        run: |
          pnpm install
          cd slidev-theme-penguin-rtl && pnpm install && cd ..

      # -------------------------------
      # Install system fonts (important for CI rendering)
      # -------------------------------
      - name: Install system fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-noto \
            fonts-noto-cjk \
            fonts-noto-color-emoji

      # -------------------------------
      # Install Playwright browsers
      # -------------------------------
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      # -------------------------------
      # Build + Export Slides
      # -------------------------------
      - name: Build + Export Slides
        run: |
          mkdir -p dist
          mkdir -p dist/pdfs

          for file in Lecture-*.md; do
            [ -f "$file" ] || continue

            name=$(basename "$file" .md)
            echo "Processing: $name"

            # 1️⃣ Build static HTML
            pnpm slidev build "$file" \
              --out "dist/$name" \
              --base "./"

            # 2️⃣ Export PDF (stable CI settings)
            pnpm slidev export "$file" \
              --format pdf \
              --timeout 180000 \
              --wait 8000 \
              --output "dist/pdfs/$name.pdf"

            # 3️⃣ Export PNG slides
            pnpm slidev export "$file" \
              --format png \
              --timeout 180000 \
              --wait 8000 \
              --output "dist/$name"

            # 4️⃣ Use first slide as thumbnail
            if [ -f "dist/$name/1.png" ]; then
              mv "dist/$name/1.png" "dist/$name/thumbnail.png"
            fi

            # Remove extra slide images
            rm -f dist/$name/[0-9]*.png || true
          done

      # -------------------------------
      # Generate Modern index.html
      # -------------------------------
      - name: Generate index.html
        run: |
          mkdir -p dist

          {
            echo '<!DOCTYPE html>'
            echo '<html>'
            echo '<head>'
            echo '<meta charset="UTF-8" />'
            echo "<title>${SUBJECT_NAME}</title>"
            echo '<style>'
            echo 'body { font-family: system-ui, sans-serif; padding: 40px; background: #f5f7fa; }'
            echo 'h1 { margin-bottom: 30px; }'
            echo '.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }'
            echo '.card { background: white; border-radius: 14px; padding: 15px; box-shadow: 0 6px 15px rgba(0,0,0,0.06); }'
            echo '.card img { width: 100%; border-radius: 10px; margin-bottom: 12px; }'
            echo '.card a { text-decoration: none; color: #0070f3; margin-right: 12px; }'
            echo '</style>'
            echo '</head>'
            echo '<body>'
            echo "<h1>${SUBJECT_NAME}</h1>"
            echo '<div class="grid">'
          } > dist/index.html

          for dir in dist/*/; do
            name=$(basename "$dir")
            if [ "$name" = "pdfs" ]; then
              continue
            fi

            {
              echo '  <div class="card">'
              echo "    <img src=\"./$name/thumbnail.png\" alt=\"$name\">"
              echo "    <h3>$name</h3>"
              echo "    <a href=\"./$name/\">View Slides</a>"
              echo "    <a href=\"./pdfs/$name.pdf\" download>Download PDF</a>"
              echo '  </div>'
            } >> dist/index.html
          done

          {
            echo '</div>'
            echo '</body>'
            echo '</html>'
          } >> dist/index.html

      # -------------------------------
      # Deploy to GitHub Pages
      # -------------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

name: Build Slidev lectures (HTML + PDF), deploy Pages, and upload artifacts

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            yarn install
          fi
          cd slidev-theme-penguin-rtl && yarn install && cd ..

      - name: Install Slidev CLI
        run: yarn add -D @slidev/cli

      - name: Install Playwright dependencies
        run: |
          npx playwright install --with-deps chromium

      - name: Build HTML and export PDFs
        run: |
          mkdir -p dist
          mkdir -p dist/pdf
          mkdir -p pdf

          for file in Lecture*.md; do
            [ -f "$file" ] || continue
            name=$(basename "$file" .md)

            echo "Building HTML for $file"
            yarn slidev build "$file" \
              --out "dist/$name" \
              --base "/${{ github.event.repository.name }}/$name/"

            echo "Exporting PDF for $file"
            yarn slidev export "$file" \
              --output "pdf/$name.pdf"

            # Copy PDF to dist for GitHub Pages
            cp "pdf/$name.pdf" "dist/pdf/$name.pdf"
          done

      - name: Generate index.html
        run: |
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8" />
            <title>Lectures</title>
          </head>
          <body>
            <h1>Available Lectures</h1>
            <ul>
          EOF

          for dir in dist/*/; do
            name=$(basename "$dir")

            # Skip pdf folder
            if [ "$name" = "pdf" ]; then
              continue
            fi

            echo "              <li>" >> dist/index.html
            echo "                <a href=\"./$name/\">$name (HTML)</a> | " >> dist/index.html
            echo "                <a href=\"./pdf/$name.pdf\" download>Download PDF</a>" >> dist/index.html
            echo "              </li>" >> dist/index.html
          done

          cat >> dist/index.html << 'EOF'
            </ul>
          </body>
          </html>
          EOF

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: slidev-pdfs
          path: pdf

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
